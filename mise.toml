[env]
HK_MISE = 1

[tools]
"aqua:gastownhall/beads" = "1.0.2"
hk = "1.43.0"
cocogitto = "7.0.0"

typos = "1.45.1"

shellcheck = "0.11.0"
shfmt = "3.13.1"
yamllint = "1.38.0"
yamlfmt = "0.21.0"
taplo = "0.10.0"
pkl = "0.31.1"
"npm:markdownlint-cli" = "0.48.0"

actionlint = "1.7.12"
ghalint = "1.5.5"
zizmor = "1.24.1"

go = "1.26.2"
gofumpt = "0.9.2"
staticcheck = "2026.1"
"go:github.com/kisielk/errcheck" = "1.10.0"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.3.0"
"go:github.com/securego/gosec/v2/cmd/gosec" = "2.25.0"

trivy = "0.70.0"
lychee = "0.23.0"

cosign = "3.0.6"
syft = "1.43.0"
goreleaser = "2.15.4"

[hooks]
postinstall = "hk install --mise"

[tasks.run]
description = "Run project app from source"
run = "go run ./cmd/hatchctl"

[tasks.lint]
description = "Run hk-managed lint checks across the repository"
run = "hk check --all"

[tasks."lint:slow"]
description = "Run hk slow-profile checks across the repository"
run = "hk check --all --profile slow"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
run = "hk fix --all"

[tasks.test]
description = "Run fast Go tests"
run = "go test ./..."

[tasks."test:coverage"]
description = "Run Go tests with coverage"
run = "profile=${COVERPROFILE:-coverage.out}; go test ./... -covermode=atomic -coverprofile=\"$profile\" && go tool cover -func=\"$profile\""

[tasks."test:integration"]
description = "Run Docker and Podman integration tests"
run = "go test -tags=integration ./internal/app"

[tasks."test:race"]
description = "Run race detector on high-risk packages"
run = "go test -race ./internal/app ./internal/reconcile ./internal/store/fs"

[tasks.build]
description = "Build Go packages"
run = "go build ./..."

[tasks."build:bridge-helpers"]
description = "Build embedded Linux bridge helpers"
run = """
mkdir -p internal/bridge/generated/assets/linux_amd64 internal/bridge/generated/assets/linux_arm64 && \
CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o internal/bridge/generated/assets/linux_amd64/hatchctl ./cmd/hatchctl && \
CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o internal/bridge/generated/assets/linux_arm64/hatchctl ./cmd/hatchctl && \
chmod 0755 internal/bridge/generated/assets/linux_amd64/hatchctl internal/bridge/generated/assets/linux_arm64/hatchctl
"""

[tasks.audit]
description = "Run hk-managed security audits"
run = "hk check --all --profile slow --step go-vuln-check --step go-sec --step trivy-fs"

[tasks."check:commits"]
description = "Check conventional commits for new commits"
run = "cog check"

[tasks."release:version"]
description = "Create the next version and tag"
run = "cog bump --auto"

[tasks."release:check"]
description = "Validate GoReleaser configuration"
run = "goreleaser check"

[tasks."release:verify"]
description = "Verify release prerequisites are clean"
run = """
tmp=$(mktemp -d)
trap 'git worktree remove --force "$tmp"' EXIT
git worktree add --quiet --detach "$tmp" HEAD
(
  cd "$tmp" &&
  go mod tidy &&
  test -z "$(git status --porcelain -- go.mod go.sum)" &&
  test -z "$(git status --porcelain)"
)
"""

[tasks."release:publish"]
description = "Publish release artifacts for the current tag"
depends = ["check", "release:verify"]
run = "goreleaser release --clean"

[tasks.release]
description = "Publish the current tagged release"
depends = ["release:publish"]

[tasks.check]
description = "Run project checks"
depends = ["lint", "test", "build", "audit", "check:commits", "release:check"]
