[env]
HK_MISE = 1
HK_PKL_BACKEND = "pklr"

[tools]
"aqua:gastownhall/beads" = "1.0.2"
hk = "1.43.0"
cocogitto = "7.0.0"

typos = "1.45.1"

shellcheck = "0.11.0"
yamlfmt = "0.21.0"
taplo = "0.10.0"

actionlint = "1.7.12"
zizmor = "1.24.1"

go = "1.26.2"
gofumpt = "0.9.2"
staticcheck = "2026.1"

trivy = "0.70.0"
lychee = "0.23.0"

cosign = "3.0.6"
syft = "1.43.0"
goreleaser = "2.15.4"

[hooks]
postinstall = "hk install --mise"

[tasks.hatchctl]
description = "Run project app from source"
run = "go run ./cmd/hatchctl"

[tasks.lint]
description = "Run hk-managed checks across the repository"
run = "hk check --all"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
run = "hk fix --all"

[tasks.test]
description = "Run fast Go tests"
run = "go test ./..."

[tasks."test:coverage"]
description = "Run Go tests with coverage"
run = "profile=${COVERPROFILE:-coverage.out}; go test ./... -covermode=atomic -coverprofile=\"$profile\" && go tool cover -func=\"$profile\""

[tasks."test:integration"]
description = "Run Docker and Podman integration tests"
run = "go test -tags=integration ./internal/app"

[tasks."test:race"]
description = "Run race detector on high-risk packages"
run = "go test -race ./internal/app ./internal/reconcile ./internal/store/fs"

[tasks.build]
description = "Build Go packages"
run = "go build ./..."

[tasks."release:verify"]
description = "Verify release prerequisites are clean"
run = """
tmp=$(mktemp -d)
trap 'git worktree remove --force "$tmp"' EXIT
git worktree add --quiet --detach "$tmp" HEAD
(
  cd "$tmp" &&
  go mod tidy &&
  test -z "$(git status --porcelain -- go.mod go.sum)" &&
  test -z "$(git status --porcelain)"
)
"""

[tasks."release:version"]
description = "Create, tag, and push the next version"
depends = ["release:verify"]
run = "cog bump --auto && git push && git push --tags"

[tasks.release]
description = "Verify, version, and push the next release"
depends = ["release:verify", "release:version"]

[tasks."release:publish"]
description = "Publish release artifacts for the current tag"
depends = ["check", "release:verify"]
run = "goreleaser release --clean"

[tasks.check]
description = "Run project checks"
depends = ["lint", "test", "build"]
