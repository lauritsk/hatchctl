version: 2

builds:
  - id: hatchctl
    main: ./cmd/hatchctl
    binary: hatchctl
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/lauritsk/hatchctl/internal/version.Version={{ .Version }}
  - id: hatchctl-bridge-helper
    main: ./cmd/hatchctl-bridge-helper
    binary: hatchctl-bridge-helper-linux-{{ .Arch }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

checksum:
  name_template: checksums.txt

archives:
  - id: hatchctl
    ids:
      - hatchctl
  - id: hatchctl-bridge-helper
    ids:
      - hatchctl-bridge-helper
    name_template: "{{ .ProjectName }}-bridge-helper_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: checksum
