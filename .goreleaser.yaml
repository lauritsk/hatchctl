version: 2

before:
  hooks:
    - rm -rf internal/bridge/embedded
    - mkdir -p internal/bridge/embedded
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o internal/bridge/embedded/hatchctl-bridge-helper-linux-amd64 ./cmd/hatchctl-bridge-helper
    - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -o internal/bridge/embedded/hatchctl-bridge-helper-linux-arm64 ./cmd/hatchctl-bridge-helper

builds:
  - id: hatchctl
    main: ./cmd/hatchctl
    binary: hatchctl
    tags:
      - release
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/lauritsk/hatchctl/internal/version.Version={{ .Version }}

checksum:
  name_template: checksums.txt

archives:
  - id: hatchctl
    ids:
      - hatchctl

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: checksum
