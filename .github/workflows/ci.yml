name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_EXPERIMENTAL: true

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-mise-go-cache
      - run: mise run check

  macos-smoke:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-mise-go-cache
      - run: mise run test
      - run: mise run build
      - run: mise run run -- bridge doctor --workspace . --config .devcontainer/devcontainer.json --json

  runtime-integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-mise-go-cache
      - run: mise run test:integration

  race:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-mise-go-cache
      - run: mise run test:race

  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-mise-go-cache
      - run: mise run test:coverage
        env:
          COVERPROFILE: ${{ runner.temp }}/coverage.out
      - run: |
          {
            echo "## Coverage"
            echo
            echo '```text'
            go tool cover -func="$COVERPROFILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          COVERPROFILE: ${{ runner.temp }}/coverage.out
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-profile
          path: ${{ runner.temp }}/coverage.out

  release-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-mise-go-cache
      - run: mise run release:verify
